name: Build Android APK

on:
  push:
    branches:
      - v2
      - main
  pull_request:
    branches:
      - v2
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true
        
      - name: Get APK file name
        id: apk_name
        run: |
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "debug_apk=${DEBUG_APK}" >> $GITHUB_OUTPUT
          echo "Debug APK: ${DEBUG_APK}"
          
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: samrat-satta-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          
      - name: Upload Release APK (if exists)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: samrat-satta-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
        continue-on-error: true
        
      - name: Get commit info
        id: commit_info
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --pretty=%B | head -1)" >> $GITHUB_OUTPUT
          
      - name: Create build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Build Successful**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ steps.commit_info.outputs.sha_short }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Message:** ${{ steps.commit_info.outputs.commit_msg }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Debug APK uploaded as artifact \`samrat-satta-debug-apk\`" >> $GITHUB_STEP_SUMMARY
          echo "- Download from the Actions tab above" >> $GITHUB_STEP_SUMMARY
